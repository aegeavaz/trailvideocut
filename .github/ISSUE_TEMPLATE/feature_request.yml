name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for TrailVideoCut? Describe it below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What feature would you like to see?"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "How would you use this feature? What problem does it solve?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Have you considered any workarounds or alternative approaches?"
    validations:
      required: false
