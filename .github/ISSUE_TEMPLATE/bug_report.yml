name: Bug Report
description: Report a bug in TrailVideoCut
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, Ubuntu 24.04, macOS 15"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.3 (or 'Windows .exe' if using the standalone build)"
    validations:
      required: true

  - type: input
    id: ffmpeg-version
    attributes:
      label: FFmpeg Version
      description: "Run `ffmpeg -version` to find this"
      placeholder: "e.g. 7.0.1"
    validations:
      required: false

  - type: input
    id: gpu
    attributes:
      label: GPU Info
      description: "GPU model and driver version, if applicable"
      placeholder: "e.g. NVIDIA RTX 4070, driver 555.42"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Run `trailvideocut cut ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: "Paste any relevant log output or error messages"
      render: shell
    validations:
      required: false
