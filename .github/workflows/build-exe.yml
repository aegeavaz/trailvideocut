name: Build Windows Executable

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[ui]" pyinstaller

      - name: Download full FFmpeg (GPL, NVENC-enabled)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg-full.zip
          Expand-Archive -Path ffmpeg-full.zip -DestinationPath ffmpeg-full
          $binDir = Get-ChildItem -Path ffmpeg-full -Recurse -Directory -Filter "bin" | Select-Object -First 1
          Copy-Item "$($binDir.FullName)\ffmpeg.exe" -Destination "ffmpeg.exe"
          Copy-Item "$($binDir.FullName)\ffprobe.exe" -Destination "ffprobe.exe"
          Write-Host "FFmpeg version:"
          .\ffmpeg.exe -version | Select-Object -First 3
          Write-Host "NVENC support:"
          .\ffmpeg.exe -hide_banner -encoders 2>$null | Select-String "h264_nvenc"

      - name: Import-check UI modules
        run: python -c "import trailvideocut.ui.app; import trailvideocut.ui.video_player"

      - name: Build executable
        run: pyinstaller trailvideocut.spec

      - name: Smoke test
        run: dist\TrailVideoCut.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: TrailVideoCut-windows
          path: dist/TrailVideoCut.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TrailVideoCut.exe
          generate_release_notes: true
